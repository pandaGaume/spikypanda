<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>SpikyPanda — MNIST CNN Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 4px; font-size: 1.6em; color: #00d4ff; }
        .subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .panel { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 16px; border: 1px solid #0f3460; }
        .panel h2 { font-size: 1.1em; margin-bottom: 10px; color: #00d4ff; }
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        label { font-size: 0.9em; color: #aaa; }
        select, input[type=number] { background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a8a; border-radius: 4px; padding: 6px 10px; font-size: 0.9em; }
        button { background: #00d4ff; color: #1a1a2e; border: none; border-radius: 4px; padding: 8px 20px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        button:disabled { background: #555; color: #999; cursor: not-allowed; }
        .log { background: #0a0a1a; border-radius: 4px; padding: 10px; font-family: 'Cascadia Code', monospace; font-size: 0.8em; max-height: 200px; overflow-y: auto; line-height: 1.6; color: #8f8; white-space: pre-wrap; }
        .stats { display: flex; gap: 20px; margin-top: 10px; }
        .stat { text-align: center; }
        .stat .value { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .stat .label { font-size: 0.8em; color: #888; }
        .grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .digit { display: flex; flex-direction: column; align-items: center; background: #0f3460; border-radius: 4px; padding: 4px; width: 60px; }
        .digit canvas { image-rendering: pixelated; border-radius: 2px; }
        .digit .pred { font-size: 0.7em; margin-top: 2px; }
        .digit .pred.correct { color: #4f4; }
        .digit .pred.wrong { color: #f44; }
        .progress-bar { background: #0a0a1a; border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: #00d4ff; transition: width 0.1s; width: 0%; }
        #status { color: #aaa; font-size: 0.85em; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SpikyPanda — MNIST CNN</h1>
        <p class="subtitle">Train a convolutional neural network on handwritten digits</p>

        <div class="panel">
            <h2>Configuration</h2>
            <div class="controls">
                <div>
                    <label for="preset">Architecture:</label><br>
                    <select id="preset">
                        <option value="fast">Fast — Conv(4,3×3) → Pool → Dense</option>
                        <option value="balanced">Balanced — Conv(8,5×5) → Pool → Dense</option>
                        <option value="accuracy">Accuracy — Conv(16,5×5) → Pool → Conv(32,5×5) → Pool → Dense</option>
                    </select>
                </div>
                <div>
                    <label for="epochs">Epochs:</label><br>
                    <input type="number" id="epochs" value="3" min="1" max="50" style="width:70px" />
                </div>
                <div>
                    <label for="lr">Learning rate:</label><br>
                    <input type="number" id="lr" value="0.005" step="0.001" min="0.0001" style="width:90px" />
                </div>
                <div style="display:flex; gap:8px; align-self:flex-end;">
                    <button id="btnTrain">Train</button>
                    <button id="btnTest" disabled>Test</button>
                </div>
            </div>
            <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
            <div id="status">Load data to begin.</div>
        </div>

        <div class="panel">
            <h2>Training Log</h2>
            <div class="log" id="log">Waiting for data...
</div>
        </div>

        <div class="panel" id="resultsPanel" style="display:none">
            <h2>Test Results</h2>
            <div class="stats">
                <div class="stat"><div class="value" id="accuracy">—</div><div class="label">Accuracy</div></div>
                <div class="stat"><div class="value" id="correct">—</div><div class="label">Correct</div></div>
                <div class="stat"><div class="value" id="total">—</div><div class="label">Total</div></div>
                <div class="stat"><div class="value" id="duration">—</div><div class="label">Time</div></div>
            </div>
            <div class="grid" id="predGrid"></div>
        </div>
    </div>

    <script src="./bundle/spikypanda-core.js"></script>
    <script>
        const S = SpikypandaCore;

        const logEl = document.getElementById("log");
        const statusEl = document.getElementById("status");
        const progressFill = document.getElementById("progressFill");
        const btnTrain = document.getElementById("btnTrain");
        const btnTest = document.getElementById("btnTest");
        const resultsPanel = document.getElementById("resultsPanel");

        let trainData = null;
        let testData = null;
        let graph = null;
        let runtime = null;
        let trainer = null;

        function log(msg) {
            logEl.textContent += msg + "\n";
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(msg) { statusEl.textContent = msg; }
        function setProgress(pct) { progressFill.style.width = pct + "%"; }

        function oneHot(label, n) {
            const v = new Array(n).fill(0);
            v[label] = 1;
            return v;
        }

        function argmax(arr) {
            let best = 0;
            for (let i = 1; i < arr.length; i++) {
                if (arr[i] > arr[best]) best = i;
            }
            return best;
        }

        function drawDigit(pixels, w, h, canvas) {
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = (w * 2) + "px";
            canvas.style.height = (h * 2) + "px";
            const ctx = canvas.getContext("2d");
            const imgData = ctx.createImageData(w, h);
            for (let i = 0; i < w * h; i++) {
                const v = Math.round(pixels[i] * 255);
                imgData.data[i * 4] = v;
                imgData.data[i * 4 + 1] = v;
                imgData.data[i * 4 + 2] = v;
                imgData.data[i * 4 + 3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // Load data
        async function loadData() {
            setStatus("Loading MNIST data...");
            try {
                const [trainResp, testResp] = await Promise.all([
                    fetch("./data/mnist/train.json"),
                    fetch("./data/mnist/test.json"),
                ]);
                if (!trainResp.ok || !testResp.ok) throw new Error("Failed to load data files. Run: node scripts/prepare-mnist.mjs");
                trainData = await trainResp.json();
                testData = await testResp.json();
                log(`Loaded ${trainData.count} train + ${testData.count} test samples (${trainData.width}x${trainData.height}x${trainData.channels})`);
                setStatus("Ready. Select a preset and click Train.");
            } catch (e) {
                log("ERROR: " + e.message);
                setStatus("Failed to load data. Run: node scripts/prepare-mnist.mjs");
                btnTrain.disabled = true;
            }
        }

        // Build CNN
        function buildModel() {
            const presetMap = { fast: "fast", balanced: "balanced", accuracy: "accuracy" };
            const presetValue = document.getElementById("preset").value;
            graph = S.buildCnnFromPreset(presetValue, {
                width: trainData.width,
                height: trainData.height,
                channels: trainData.channels,
                numClasses: 10,
            });
            const lr = parseFloat(document.getElementById("lr").value);
            runtime = new S.CnnInferenceRuntime(graph);
            trainer = new S.CnnTrainingRuntime(graph, runtime, S.LossFunctions.CrossEntropy, lr, S.Optimizers.Adam());
            log(`Built CNN (${presetValue}): ${graph.nodes.length} neurons, ${graph.links.length} synapses, ${graph.kernels.length} kernels`);
        }

        // Train
        async function train() {
            btnTrain.disabled = true;
            btnTest.disabled = true;
            const epochs = parseInt(document.getElementById("epochs").value);

            buildModel();
            setStatus("Training...");

            const totalSteps = epochs * trainData.count;
            let step = 0;

            for (let epoch = 0; epoch < epochs; epoch++) {
                let epochLoss = 0;

                for (let i = 0; i < trainData.count; i++) {
                    const sample = trainData.samples[i];
                    const loss = trainer.trainStep(sample.pixels, oneHot(sample.label, 10));
                    epochLoss += loss;
                    step++;

                    // Update progress every 10 samples
                    if (i % 10 === 0) {
                        setProgress((step / totalSteps) * 100);
                        setStatus(`Epoch ${epoch + 1}/${epochs} — Sample ${i + 1}/${trainData.count}`);
                        // Yield to UI
                        await new Promise(r => setTimeout(r, 0));
                    }
                }

                const avgLoss = epochLoss / trainData.count;
                log(`Epoch ${epoch + 1}/${epochs} — Avg loss: ${avgLoss.toFixed(6)}`);
            }

            setProgress(100);
            setStatus("Training complete. Click Test to evaluate.");
            log("Training finished.");
            btnTrain.disabled = false;
            btnTest.disabled = false;
        }

        // Test
        async function test() {
            if (!runtime || !testData) return;
            btnTest.disabled = true;
            btnTrain.disabled = true;

            setStatus("Running inference on test set...");

            runtime.deleteContext();
            trainer.deleteContext();

            let correctCount = 0;
            const predictions = [];

            const t0 = performance.now();

            for (let i = 0; i < testData.count; i++) {
                const sample = testData.samples[i];
                const output = runtime.run(sample.pixels);
                const predicted = argmax(output);
                const correct = predicted === sample.label;
                if (correct) correctCount++;
                predictions.push({ label: sample.label, predicted, correct, pixels: sample.pixels });

                if (i % 20 === 0) {
                    setStatus(`Testing ${i + 1}/${testData.count}...`);
                    await new Promise(r => setTimeout(r, 0));
                }
            }

            const elapsed = performance.now() - t0;
            const acc = (correctCount / testData.count * 100).toFixed(1);

            log(`Accuracy: ${acc}% (${correctCount}/${testData.count}) — ${elapsed.toFixed(0)}ms`);

            // Show results
            resultsPanel.style.display = "block";
            document.getElementById("accuracy").textContent = acc + "%";
            document.getElementById("correct").textContent = correctCount;
            document.getElementById("total").textContent = testData.count;
            document.getElementById("duration").textContent = elapsed.toFixed(0) + "ms";

            // Render prediction grid (first 60 samples)
            const grid = document.getElementById("predGrid");
            grid.innerHTML = "";
            const showCount = Math.min(60, predictions.length);
            for (let i = 0; i < showCount; i++) {
                const p = predictions[i];
                const div = document.createElement("div");
                div.className = "digit";
                const canvas = document.createElement("canvas");
                drawDigit(p.pixels, testData.width, testData.height, canvas);
                div.appendChild(canvas);
                const span = document.createElement("span");
                span.className = "pred " + (p.correct ? "correct" : "wrong");
                span.textContent = `${p.predicted}` + (p.correct ? " ✓" : ` ✗(${p.label})`);
                div.appendChild(span);
                grid.appendChild(div);
            }

            setStatus(`Done — Accuracy: ${acc}% — ${elapsed.toFixed(0)}ms`);
            btnTrain.disabled = false;
            btnTest.disabled = false;
        }

        btnTrain.addEventListener("click", train);
        btnTest.addEventListener("click", test);

        loadData();
    </script>
</body>
</html>
