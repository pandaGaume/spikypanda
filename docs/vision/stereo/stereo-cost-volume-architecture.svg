<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowStd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888eb0"/>
    </marker>
    <marker id="arrowCV" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c792ea"/>
    </marker>
    <marker id="arrowOut2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7fdbca"/>
    </marker>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f1429"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad2)" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#888eb0" font-size="18" font-weight="bold">State of the Art - Cost Volume Stereo Matching</text>
  <text x="450" y="55" text-anchor="middle" fill="#5a6080" font-size="12">DispNet, PSMNet, RAFT-Stereo, CREStereo (2016-2022)</text>

  <!-- Left branch -->
  <text x="200" y="85" text-anchor="middle" fill="#888eb0" font-size="14" font-weight="bold">Left Branch</text>

  <!-- Left Input -->
  <rect x="130" y="95" width="140" height="45" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Left Image</text>
  <text x="200" y="130" text-anchor="middle" fill="#5a6080" font-size="10">H x W x 3</text>

  <!-- Left Feature Extractor -->
  <rect x="110" y="165" width="180" height="55" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1.5"/>
  <text x="200" y="185" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Feature Extractor</text>
  <text x="200" y="200" text-anchor="middle" fill="#5a6080" font-size="10">ResNet / multi-scale CNN</text>
  <text x="200" y="212" text-anchor="middle" fill="#5a6080" font-size="9">shared weights</text>

  <!-- Left arrow -->
  <line x1="200" y1="140" x2="200" y2="163" stroke="#888eb0" stroke-width="1.5" marker-end="url(#arrowStd)"/>

  <!-- Left Features -->
  <rect x="140" y="245" width="120" height="35" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1"/>
  <text x="200" y="267" text-anchor="middle" fill="#ccd6f6" font-size="10">Features L (h x w x F)</text>

  <line x1="200" y1="220" x2="200" y2="243" stroke="#888eb0" stroke-width="1.5" marker-end="url(#arrowStd)"/>

  <!-- Right branch -->
  <text x="700" y="85" text-anchor="middle" fill="#888eb0" font-size="14" font-weight="bold">Right Branch</text>

  <!-- Right Input -->
  <rect x="630" y="95" width="140" height="45" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1.5"/>
  <text x="700" y="115" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Right Image</text>
  <text x="700" y="130" text-anchor="middle" fill="#5a6080" font-size="10">H x W x 3</text>

  <!-- Right Feature Extractor -->
  <rect x="610" y="165" width="180" height="55" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1.5"/>
  <text x="700" y="185" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Feature Extractor</text>
  <text x="700" y="200" text-anchor="middle" fill="#5a6080" font-size="10">ResNet / multi-scale CNN</text>
  <text x="700" y="212" text-anchor="middle" fill="#5a6080" font-size="9">shared weights</text>

  <!-- Right arrow -->
  <line x1="700" y1="140" x2="700" y2="163" stroke="#888eb0" stroke-width="1.5" marker-end="url(#arrowStd)"/>

  <!-- Right Features -->
  <rect x="640" y="245" width="120" height="35" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1"/>
  <text x="700" y="267" text-anchor="middle" fill="#ccd6f6" font-size="10">Features R (h x w x F)</text>

  <line x1="700" y1="220" x2="700" y2="243" stroke="#888eb0" stroke-width="1.5" marker-end="url(#arrowStd)"/>

  <!-- COST VOLUME (the external operation) -->
  <rect x="300" y="305" width="300" height="70" rx="8" fill="#2a1a3a" stroke="#c792ea" stroke-width="2"/>
  <text x="450" y="328" text-anchor="middle" fill="#c792ea" font-size="13" font-weight="bold">Cost Volume</text>
  <text x="450" y="345" text-anchor="middle" fill="#d4b8ea" font-size="10">Correlation(L[x,y], R[x-d,y]) for d=0..Dmax</text>
  <text x="450" y="360" text-anchor="middle" fill="#d4b8ea" font-size="10">Output: H x W x Dmax (3D tensor)</text>

  <!-- Arrows to cost volume -->
  <line x1="200" y1="280" x2="350" y2="303" stroke="#c792ea" stroke-width="1.5" marker-end="url(#arrowCV)"/>
  <line x1="700" y1="280" x2="550" y2="303" stroke="#c792ea" stroke-width="1.5" marker-end="url(#arrowCV)"/>

  <!-- NO LEARNING label on cost volume -->
  <rect x="620" y="310" width="160" height="25" rx="4" fill="#3a1a1a" stroke="#ff5555" stroke-width="1"/>
  <text x="700" y="327" text-anchor="middle" fill="#ff5555" font-size="10" font-weight="bold">No learned parameters</text>

  <!-- 3D Convolution / Regularization -->
  <rect x="320" y="400" width="260" height="50" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">3D Conv Regularization</text>
  <text x="450" y="435" text-anchor="middle" fill="#5a6080" font-size="10">Hourglass / stacked 3D CNN</text>

  <line x1="450" y1="375" x2="450" y2="398" stroke="#888eb0" stroke-width="1.5" marker-end="url(#arrowStd)"/>

  <!-- Soft argmin -->
  <rect x="350" y="475" width="200" height="35" rx="6" fill="#1a1a2a" stroke="#888eb0" stroke-width="1"/>
  <text x="450" y="497" text-anchor="middle" fill="#ccd6f6" font-size="11">Soft Argmin (disparity regression)</text>

  <line x1="450" y1="450" x2="450" y2="473" stroke="#888eb0" stroke-width="1.5" marker-end="url(#arrowStd)"/>

  <!-- Output -->
  <rect x="350" y="530" width="200" height="40" rx="6" fill="#0a2a1a" stroke="#7fdbca" stroke-width="2"/>
  <text x="450" y="555" text-anchor="middle" fill="#7fdbca" font-size="13" font-weight="bold">Disparity Map</text>

  <line x1="450" y1="510" x2="450" y2="528" stroke="#7fdbca" stroke-width="1.5" marker-end="url(#arrowOut2)"/>

  <!-- Limitations callout -->
  <rect x="30" y="390" width="260" height="100" rx="6" fill="#1a1a0a" stroke="#888855" stroke-width="1"/>
  <text x="160" y="410" text-anchor="middle" fill="#bbbb66" font-size="11" font-weight="bold">Limitations</text>
  <text x="160" y="428" text-anchor="middle" fill="#999960" font-size="9">- Cost volume is a passive operation</text>
  <text x="160" y="442" text-anchor="middle" fill="#999960" font-size="9">- No learned matching at correlation stage</text>
  <text x="160" y="456" text-anchor="middle" fill="#999960" font-size="9">- O(H x W x Dmax x F) memory</text>
  <text x="160" y="470" text-anchor="middle" fill="#999960" font-size="9">- Unidirectional (L to R only)</text>
  <text x="160" y="484" text-anchor="middle" fill="#999960" font-size="9">- Not visualizable / not mutable</text>

  <!-- Legend -->
  <rect x="30" y="545" width="290" height="60" rx="6" fill="#0f1429" stroke="#2a3a5a" stroke-width="1"/>
  <text x="50" y="565" fill="#5a6080" font-size="11" font-weight="bold">Legend:</text>
  <line x1="50" y1="580" x2="90" y2="580" stroke="#888eb0" stroke-width="2"/>
  <text x="100" y="584" fill="#ccd6f6" font-size="10">Learned layers (CNN)</text>
  <line x1="50" y1="596" x2="90" y2="596" stroke="#c792ea" stroke-width="2"/>
  <text x="100" y="600" fill="#ccd6f6" font-size="10">External operation (no weights)</text>

  <!-- Shared kernel indicator -->
  <rect x="370" y="130" width="160" height="25" rx="4" fill="#0a2a1a" stroke="#7fdbca" stroke-width="1"/>
  <text x="450" y="147" text-anchor="middle" fill="#7fdbca" font-size="10" font-weight="bold">Same CNN (weight sharing)</text>
  <line x1="290" y1="190" x2="368" y2="143" stroke="#7fdbca" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="610" y1="190" x2="532" y2="143" stroke="#7fdbca" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- References -->
  <text x="700" y="580" text-anchor="middle" fill="#5a6080" font-size="9">DispNet (2016), PSMNet (2018), AANet (2020)</text>
  <text x="700" y="595" text-anchor="middle" fill="#5a6080" font-size="9">RAFT-Stereo (2021), CREStereo (2022)</text>
</svg>
