<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00d4ff"/>
    </marker>
    <marker id="arrowCross" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ff6b35"/>
    </marker>
    <marker id="arrowOut" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7fdbca"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f1429"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#00d4ff" font-size="18" font-weight="bold">SpikyPanda - Cross-Synapse Stereo Matching (Ours)</text>
  <text x="450" y="55" text-anchor="middle" fill="#8892b0" font-size="12">Graph-based binocular matching via learned inter-branch synapses</text>

  <!-- Left branch -->
  <text x="200" y="85" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">Left Branch</text>

  <!-- Left Input -->
  <rect x="130" y="95" width="140" height="45" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Left Image</text>
  <text x="200" y="130" text-anchor="middle" fill="#8892b0" font-size="10">H x W x 1</text>

  <!-- Left Conv1 -->
  <rect x="130" y="170" width="140" height="45" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="200" y="190" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Conv1 (8, 3x3)</text>
  <text x="200" y="205" text-anchor="middle" fill="#8892b0" font-size="10">ReLU + shared kernel</text>

  <!-- Left Conv2 (optional) -->
  <rect x="130" y="280" width="140" height="45" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="200" y="300" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Conv2 (16, 3x3)</text>
  <text x="200" y="315" text-anchor="middle" fill="#8892b0" font-size="10">ReLU + shared kernel</text>

  <!-- Right branch -->
  <text x="700" y="85" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">Right Branch</text>

  <!-- Right Input -->
  <rect x="630" y="95" width="140" height="45" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="700" y="115" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Right Image</text>
  <text x="700" y="130" text-anchor="middle" fill="#8892b0" font-size="10">H x W x 1</text>

  <!-- Right Conv1 -->
  <rect x="630" y="170" width="140" height="45" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="700" y="190" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Conv1 (8, 3x3)</text>
  <text x="700" y="205" text-anchor="middle" fill="#8892b0" font-size="10">ReLU + shared kernel</text>

  <!-- Right Conv2 -->
  <rect x="630" y="280" width="140" height="45" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="700" y="300" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Conv2 (16, 3x3)</text>
  <text x="700" y="315" text-anchor="middle" fill="#8892b0" font-size="10">ReLU + shared kernel</text>

  <!-- Intra-branch arrows -->
  <line x1="200" y1="140" x2="200" y2="168" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="215" x2="200" y2="278" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="140" x2="700" y2="168" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="215" x2="700" y2="278" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cross-synapses (the key innovation) -->
  <!-- Conv1 cross-synapses -->
  <line x1="270" y1="185" x2="630" y2="185" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCross)"/>
  <line x1="630" y1="200" x2="270" y2="200" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCross)"/>

  <!-- Conv2 cross-synapses -->
  <line x1="270" y1="295" x2="630" y2="295" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCross)"/>
  <line x1="630" y1="310" x2="270" y2="310" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCross)"/>

  <!-- Cross-synapse labels -->
  <rect x="350" y="172" width="200" height="36" rx="4" fill="#2a1a0a" stroke="#ff6b35" stroke-width="1"/>
  <text x="450" y="188" text-anchor="middle" fill="#ff6b35" font-size="10" font-weight="bold">Cross-Synapses (d=0..Dmax)</text>
  <text x="450" y="201" text-anchor="middle" fill="#ffb088" font-size="9">L(x,y) &lt;-&gt; R(x-d, y) bidirectional</text>

  <rect x="350" y="282" width="200" height="36" rx="4" fill="#2a1a0a" stroke="#ff6b35" stroke-width="1"/>
  <text x="450" y="298" text-anchor="middle" fill="#ff6b35" font-size="10" font-weight="bold">Cross-Synapses (d=0..Dmax)</text>
  <text x="450" y="311" text-anchor="middle" fill="#ffb088" font-size="9">Learned weights per disparity</text>

  <!-- Shared kernel indicator -->
  <rect x="370" y="225" width="160" height="30" rx="4" fill="#0a2a1a" stroke="#7fdbca" stroke-width="1"/>
  <text x="450" y="244" text-anchor="middle" fill="#7fdbca" font-size="10" font-weight="bold">Same Kernel (weight sharing)</text>
  <line x1="200" y1="245" x2="368" y2="240" stroke="#7fdbca" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="700" y1="245" x2="532" y2="240" stroke="#7fdbca" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Merge layer -->
  <rect x="330" y="355" width="240" height="45" rx="6" fill="#1a2744" stroke="#7fdbca" stroke-width="1.5"/>
  <text x="450" y="375" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="bold">Merge (concat L + R)</text>
  <text x="450" y="390" text-anchor="middle" fill="#8892b0" font-size="10">Channels doubled</text>

  <!-- Merge arrows -->
  <line x1="200" y1="325" x2="380" y2="353" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="325" x2="520" y2="353" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Flatten + Dense -->
  <rect x="330" y="425" width="240" height="35" rx="6" fill="#1a2744" stroke="#00d4ff" stroke-width="1"/>
  <text x="450" y="447" text-anchor="middle" fill="#ccd6f6" font-size="11">Flatten + Dense (sigmoid)</text>

  <line x1="450" y1="400" x2="450" y2="423" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="350" y="485" width="200" height="40" rx="6" fill="#0a2a1a" stroke="#7fdbca" stroke-width="2"/>
  <text x="450" y="510" text-anchor="middle" fill="#7fdbca" font-size="13" font-weight="bold">Disparity Map</text>

  <line x1="450" y1="460" x2="450" y2="483" stroke="#7fdbca" stroke-width="1.5" marker-end="url(#arrowOut)"/>

  <!-- Legend -->
  <rect x="30" y="540" width="840" height="65" rx="6" fill="#0f1429" stroke="#2a3a5a" stroke-width="1"/>
  <text x="50" y="560" fill="#8892b0" font-size="11" font-weight="bold">Legend:</text>

  <line x1="50" y1="577" x2="90" y2="577" stroke="#00d4ff" stroke-width="2"/>
  <text x="100" y="581" fill="#ccd6f6" font-size="10">Intra-branch synapse (standard CNN)</text>

  <line x1="300" y1="577" x2="340" y2="577" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="350" y="581" fill="#ccd6f6" font-size="10">Cross-synapse (learned, d=0..Dmax)</text>

  <line x1="580" y1="577" x2="620" y2="577" stroke="#7fdbca" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="630" y="581" fill="#ccd6f6" font-size="10">Shared kernel (siamese weight tying)</text>

  <!-- Key innovation callout -->
  <rect x="580" y="420" width="280" height="70" rx="6" fill="#1a0a0a" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="720" y="440" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="bold">Key Innovation</text>
  <text x="720" y="456" text-anchor="middle" fill="#ffb088" font-size="10">Matching emerges from learned</text>
  <text x="720" y="470" text-anchor="middle" fill="#ffb088" font-size="10">synaptic weights, not from an</text>
  <text x="720" y="484" text-anchor="middle" fill="#ffb088" font-size="10">external cost volume operation</text>
</svg>
